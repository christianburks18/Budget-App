<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Budget Pro</title>
    <style>
        :root {
            --bg: #f8f8fc; --card: #ffffff; --blue: #007aff;
            --green: #34c759; --red: #ff3b30; --text: #1c1c1e;
            --gray: #8e8e93; --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 120px; }

    /* ── Header: CSS Grid so iOS Safari can't collapse it ── */
    .header {
        display: grid;
        grid-template-columns: 38px 1fr 38px;
        align-items: center;
        column-gap: 10px;
        padding: 12px 16px 10px;
        padding-top: max(12px, env(safe-area-inset-top));
        position: sticky; top: 0;
        background: var(--bg); z-index: 10;
    }
    .header-btn {
        width: 38px; height: 38px; border-radius: 19px;
        background: var(--card); border: none;
        font-size: 18px; display: flex; align-items: center; justify-content: center;
        box-shadow: var(--shadow); cursor: pointer;
        /* prevent shrinking */
        flex-shrink: 0; -webkit-flex-shrink: 0;
    }
    .header-month {
        text-align: center;
        font-size: 15px; font-weight: 700; color: var(--text);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── Search bar ── */
    .search-box { position: relative; padding: 0 16px 12px; }
    .search-input { width: 100%; padding: 12px 40px 12px 16px; border-radius: 12px; border: 1px solid #d1d1d6; background: var(--card); font-size: 16px; outline: none; }
    .clear-btn { position: absolute; right: 26px; top: 12px; font-size: 18px; color: var(--gray); border: none; background: none; display: none; cursor: pointer; }

    /* ── Hero savings card ── */
    .hero-card {
        margin: 0 16px 16px;
        border-radius: 24px;
        background: linear-gradient(135deg, #007aff 0%, #5856d6 100%);
        box-shadow: 0 8px 28px rgba(0,122,255,0.38);
        padding: 20px 20px 18px;
        color: white;
    }
    .hero-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
    .hero-month { font-size: 10px; font-weight: 700; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 3px; }
    .hero-label { font-size: 12px; font-weight: 600; opacity: 0.85; margin-bottom: 2px; }
    .hero-amount { font-size: 34px; font-weight: 800; letter-spacing: -0.5px; }
    .hero-rate-badge {
        background: rgba(255,255,255,0.2); border-radius: 12px;
        padding: 5px 11px; font-size: 13px; font-weight: 800;
        backdrop-filter: blur(4px); white-space: nowrap; align-self: flex-start;
    }
    .hero-bar-track { height: 7px; background: rgba(255,255,255,0.2); border-radius: 10px; overflow: hidden; margin-bottom: 7px; }
    .hero-bar-fill { height: 100%; border-radius: 10px; background: linear-gradient(90deg, rgba(255,255,255,0.85), #30d158); transition: width 0.6s cubic-bezier(0.25,1,0.5,1); }
    .hero-bar-labels { display: flex; justify-content: space-between; margin-bottom: 14px; }
    .hero-bar-labels span { font-size: 10px; font-weight: 600; opacity: 0.7; }
    .hero-pills { display: flex; gap: 8px; }
    .hero-pill { flex: 1; background: rgba(255,255,255,0.15); border-radius: 12px; padding: 8px 6px; text-align: center; backdrop-filter: blur(4px); }
    .hero-pill h5 { font-size: 9px; font-weight: 700; opacity: 0.75; text-transform: uppercase; margin-bottom: 3px; letter-spacing: 0.3px; }
    .hero-pill p  { font-size: 12px; font-weight: 800; }

    /* ── Filter tabs ── */
    .filter-section { padding: 0 16px 14px; display: flex; gap: 8px; }
    .filter-btn { flex: 1; padding: 11px; border-radius: 12px; border: none; background: #e3e3e8; font-weight: 700; font-size: 13px; cursor: pointer; }
    .filter-btn.active { background: var(--blue); color: white; }

    /* ── Item cards ── */
    .item-card { background: var(--card); padding: 14px 16px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; box-shadow: var(--shadow); }
    .item-main { display: flex; flex-direction: column; gap: 2px; }
    .item-date { font-size: 10px; color: var(--blue); font-weight: 700; text-transform: uppercase; }
    .item-sub  { font-size: 12px; color: var(--gray); }
    .recurring-badge { font-size: 9px; font-weight: 700; color: var(--blue); background: #e8f0fe; border-radius: 6px; padding: 2px 6px; display: inline-block; margin-top: 2px; width: fit-content; }

    /* ── Month-over-month badges ── */
    .mom-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 8px; white-space: nowrap; }
    .mom-up    { color: var(--red);   background: #fff0ef; }
    .mom-down  { color: var(--green); background: #edfaf1; }
    .mom-flat  { color: var(--gray);  background: #f2f2f7; }

    /* ── Accordions ── */
    .archive-group { margin-bottom: 12px; }
    .accordion-header { background: var(--card); padding: 16px 18px; border-radius: 18px; display: flex; flex-direction: column; align-items: flex-start; box-shadow: var(--shadow); cursor: pointer; }
    .acc-meta { font-size: 10px; color: var(--gray); font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
    .acc-row  { display: flex; justify-content: space-between; width: 100%; align-items: center; }
    .accordion-content { overflow: hidden; max-height: 0; transition: max-height 0.3s ease; padding: 0 4px; }
    .accordion-content.open { max-height: 5000px; padding-top: 10px; }

    /* ── Trends ── */
    .chart-container { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: var(--shadow); }
    .chart-title { font-size: 14px; font-weight: 700; margin-bottom: 15px; }
    .bar-chart { display: flex; align-items: flex-end; justify-content: space-around; height: 160px; padding-bottom: 25px; border-bottom: 1px solid #eee; gap: 8px; }

    /* ── Sheets & overlay ── */
    .sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-radius: 24px 24px 0 0; padding: 25px 25px 40px; z-index: 1000; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.15,0.85,0.35,1); box-shadow: 0 -5px 20px rgba(0,0,0,0.1); }
    .sheet.active { transform: translateY(0); }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 999; display: none; }
    .input-group { margin-bottom: 18px; }
    .input-label { font-size: 11px; color: var(--gray); font-weight: 700; text-transform: uppercase; margin-bottom: 8px; display: block; }
    input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #d1d1d6; background: #f2f2f7; font-size: 16px; outline: none; }

    /* ── Recurring Yes/No ── */
    .recur-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px; }
    .recur-btn { padding: 18px; border-radius: 14px; border: 2px solid #d1d1d6; background: #f2f2f7; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
    .recur-btn.selected { border-color: var(--blue); background: #e8f0fe; color: var(--blue); }

    /* ── Nav & FAB ── */
    .bottom-nav {
        position: fixed; bottom: 0; width: 100%;
        background: rgba(255,255,255,0.95); backdrop-filter: blur(20px);
        display: flex; padding: 10px 0;
        padding-bottom: max(28px, env(safe-area-inset-bottom));
        border-top: 0.5px solid #d1d1d6; z-index: 100;
    }
    .nav-tab { flex: 1; border: none; background: none; display: flex; flex-direction: column; align-items: center; color: var(--gray); font-size: 10px; font-weight: 700; gap: 4px; cursor: pointer; }
    .nav-tab.active { color: var(--blue); }
    .fab { position: fixed; bottom: max(90px, calc(env(safe-area-inset-bottom) + 70px)); right: 20px; width: 56px; height: 56px; border-radius: 28px; background: var(--blue); color: white; border: none; font-size: 28px; box-shadow: 0 8px 20px rgba(0,122,255,0.4); z-index: 90; cursor: pointer; }

    /* ── Archive export btn ── */
    .export-month-btn { font-size: 11px; font-weight: 700; color: var(--blue); background: none; border: 1px solid var(--blue); border-radius: 8px; padding: 4px 10px; cursor: pointer; white-space: nowrap; }

    .hidden { display: none !important; }
</style>

<script>
    let purchases = JSON.parse(localStorage.getItem('bp_purchases') || '[]');
    let settings  = JSON.parse(localStorage.getItem('bp_settings')  || '{"pay":2285,"payDate":"","history":[]}');
    let viewMode   = 'all';
    let trendScale = 'M';

    const MONTH_ORDER = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    // ── Date helpers ──────────────────────────────────────────────────────────

    function parseLocalDate(dateStr) {
        const [y,m,d] = String(dateStr).split('T')[0].split('-').map(Number);
        return new Date(y, m-1, d);
    }
    function getMonthKey(dateStr) {
        const d = parseLocalDate(dateStr);
        return d.toLocaleString('default', { month:'long', year:'numeric' });
    }
    function abbrevMonthToKey(abbrev, year) {
        const idx = MONTH_ORDER.indexOf(abbrev);
        if (idx === -1) return '';
        return new Date(year, idx, 1).toLocaleString('default', { month:'long', year:'numeric' });
    }
    function todayStr() {
        const n = new Date();
        return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
    }

    // ── Income / history ─────────────────────────────────────────────────────

    function getInc(monthKey) {
        if (!settings.history) settings.history = [];
        const h = settings.history.find(r => r.month === monthKey);
        return (h ? h.pay : settings.pay) * 2;
    }
    function snapshotCurrentPayToHistory() {
        if (!settings.history) settings.history = [];
        const key = getMonthKey(todayStr());
        const ex  = settings.history.find(r => r.month === key);
        if (ex) { ex.pay = settings.pay; } else { settings.history.push({ month: key, pay: settings.pay }); }
    }

    // ── Recurring auto-populate ───────────────────────────────────────────────

    function autoPopulateRecurring() {
        const currentMonthKey = getMonthKey(todayStr());
        const now = new Date();
        const seen = new Set(); const templates = [];
        purchases.filter(p => p.recurring).slice()
            .sort((a,b) => parseLocalDate(b.date) - parseLocalDate(a.date))
            .forEach(p => {
                const key = `${p.merchant}|${p.category}|${p.amount}`;
                if (!seen.has(key)) { seen.add(key); templates.push(p); }
            });
        let added = false;
        templates.forEach(t => {
            const exists = purchases.some(p =>
                p.recurring && p.merchant === t.merchant &&
                p.category === t.category && getMonthKey(p.date) === currentMonthKey
            );
            if (!exists) {
                const origDay = parseLocalDate(t.date).getDate();
                const maxDay  = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
                const day     = Math.min(origDay, maxDay);
                const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                purchases.push({ id: Date.now()+Math.random(), merchant:t.merchant, category:t.category, subcategory:t.subcategory||'', amount:t.amount, date:dateStr, recurring:true, autoAdded:true });
                added = true;
            }
        });
        if (added) localStorage.setItem('bp_purchases', JSON.stringify(purchases));
    }

    // ── Hero card ─────────────────────────────────────────────────────────────

    function renderHero(spent, inc, monthKey) {
        const saved    = inc - spent;
        const pct      = inc > 0 ? Math.min(100, Math.max(0, (saved / inc) * 100)) : 0;
        const spendPct = inc > 0 ? Math.min(100, (spent / inc) * 100) : 0;

        document.getElementById('heroMonth').textContent     = monthKey;
        document.getElementById('heroSaved').textContent     = `$${saved.toFixed(2)}`;
        document.getElementById('heroRate').textContent      = `${pct.toFixed(0)}% saved`;
        document.getElementById('heroBar').style.width       = `${spendPct}%`;
        document.getElementById('heroBarLabel').textContent  = `$${spent.toFixed(2)} of $${inc.toLocaleString()} spent`;
        document.getElementById('heroIncome').textContent    = `$${inc.toLocaleString()}`;
        document.getElementById('heroSpent').textContent     = `$${spent.toFixed(2)}`;
        document.getElementById('heroRemaining').textContent = `$${saved.toFixed(2)}`;

        const now = new Date();
        document.getElementById('headerMonth').textContent = now.toLocaleString('default', { month: 'long' });

        const fill  = document.getElementById('heroBar');
        const badge = document.getElementById('heroRate');
        if (saved < 0) {
            fill.style.background  = 'linear-gradient(90deg, rgba(255,255,255,0.85), #ff3b30)';
            badge.style.background = 'rgba(255,59,48,0.25)';
        } else {
            fill.style.background  = 'linear-gradient(90deg, rgba(255,255,255,0.85), #30d158)';
            badge.style.background = 'rgba(255,255,255,0.2)';
        }
    }

    // ── Month view ────────────────────────────────────────────────────────────

    function render() {
        const now             = new Date();
        const currentMonthKey = getMonthKey(todayStr());
        const inc             = getInc(currentMonthKey);
        const query           = document.getElementById('searchInput').value.toLowerCase();

        const currentPurchases = purchases.filter(p => getMonthKey(p.date) === currentMonthKey);
        const filtered = currentPurchases.filter(p =>
            p.merchant.toLowerCase().includes(query) ||
            p.category.toLowerCase().includes(query) ||
            (p.subcategory||'').toLowerCase().includes(query)
        );
        const spent = filtered.reduce((s,p) => s + Number(p.amount), 0);

        renderHero(spent, inc, currentMonthKey);

        const list   = document.getElementById('purchaseList');
        const sorted = filtered.slice().sort((a,b) => parseLocalDate(b.date) - parseLocalDate(a.date));

        if (viewMode === 'all') {
            list.innerHTML = sorted.map(p => itemHtml(p)).join('');

        } else if (viewMode === 'category') {
            const lastMonthDate = new Date(now.getFullYear(), now.getMonth()-1, 1);
            const lastMonthKey  = getMonthKey(`${lastMonthDate.getFullYear()}-${String(lastMonthDate.getMonth()+1).padStart(2,'0')}-01`);
            const lastCats = purchases.filter(p => getMonthKey(p.date) === lastMonthKey)
                .reduce((acc,p) => { acc[p.category]=(acc[p.category]||0)+Number(p.amount); return acc; }, {});
            const cats = sorted.reduce((acc,p) => { acc[p.category]=(acc[p.category]||0)+Number(p.amount); return acc; }, {});

            list.innerHTML = Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(([n,amt],idx) => {
                const last = lastCats[n]||0;
                const diff = amt - last;
                let momHtml = '';
                if      (last===0)             momHtml = `<span class="mom-badge mom-flat">New</span>`;
                else if (Math.abs(diff)<0.01)  momHtml = `<span class="mom-badge mom-flat">= same</span>`;
                else if (diff>0)               momHtml = `<span class="mom-badge mom-up">↑ $${diff.toFixed(2)}</span>`;
                else                           momHtml = `<span class="mom-badge mom-down">↓ $${Math.abs(diff).toFixed(2)}</span>`;
                return `
                    <div class="accordion-header" style="margin-bottom:8px" onclick="toggleAcc('cat${idx}')">
                        <div class="acc-row">
                            <strong>${n}</strong>
                            <div style="display:flex;align-items:center;gap:8px">${momHtml}<strong>$${amt.toFixed(2)}</strong></div>
                        </div>
                    </div>
                    <div id="cat${idx}" class="accordion-content">${sorted.filter(p=>p.category===n).map(p=>itemHtml(p)).join('')}</div>`;
            }).join('');

        } else {
            const ranges = getWeekRanges(now.getFullYear(), now.getMonth());
            list.innerHTML = ranges.map((r,i) => {
                const items = sorted.filter(p => { const d=parseLocalDate(p.date); return d>=r.start&&d<=r.end; });
                const total = items.reduce((s,x)=>s+Number(x.amount),0);
                return `
                    <div class="accordion-header" style="margin-bottom:8px" onclick="toggleAcc('wk${i}')">
                        <div class="acc-meta">${r.label}</div>
                        <div class="acc-row"><strong>Week ${i+1}</strong><strong>$${total.toFixed(2)}</strong></div>
                    </div>
                    <div id="wk${i}" class="accordion-content">${items.map(x=>itemHtml(x)).join('')}</div>`;
            }).join('');
        }
    }

    function itemHtml(p) {
        const d       = parseLocalDate(p.date);
        const dateStr = d.toLocaleString('default', { month:'short', day:'numeric' });
        const recTag  = p.recurring ? `<span class="recurring-badge">🔁 Recurring</span>` : '';
        return `<div class="item-card">
            <div class="item-main">
                <span class="item-date">${dateStr}</span>
                <strong>${p.merchant}</strong>
                <span class="item-sub">${p.category}${p.subcategory?' • '+p.subcategory:''}</span>
                ${recTag}
            </div>
            <div style="display:flex;align-items:center;gap:12px">
                <strong style="font-size:16px">$${Number(p.amount).toFixed(2)}</strong>
                <button style="border:none;background:none;font-size:18px;cursor:pointer" onclick="deleteItem(${p.id})">🗑️</button>
            </div>
        </div>`;
    }

    // ── Archive ───────────────────────────────────────────────────────────────

    function renderArchive() {
        const currentMonthKey = getMonthKey(todayStr());
        const months = [...new Set(purchases.map(p=>getMonthKey(p.date)))]
            .filter(m=>m!==currentMonthKey).sort((a,b)=>new Date(b)-new Date(a));
        document.getElementById('archiveList').innerHTML = months.map((m,idx) => {
            const items = purchases.filter(p=>getMonthKey(p.date)===m).sort((a,b)=>parseLocalDate(b.date)-parseLocalDate(a.date));
            const total = items.reduce((s,p)=>s+Number(p.amount),0);
            return `<div class="archive-group">
                <div class="accordion-header" onclick="toggleAcc('arc${idx}')">
                    <div class="acc-row">
                        <div style="display:flex;flex-direction:column"><strong>${m}</strong><small style="color:var(--gray)">${items.length} Transactions</small></div>
                        <div style="display:flex;align-items:center;gap:10px">
                            <strong style="color:var(--red)">-$${total.toFixed(2)}</strong>
                            <button class="export-month-btn" onclick="event.stopPropagation();exportMonth('${m}')">⬇ Export</button>
                        </div>
                    </div>
                </div>
                <div id="arc${idx}" class="accordion-content">${items.map(p=>itemHtml(p)).join('')}</div>
            </div>`;
        }).join('') || `<div style="text-align:center;padding:40px;color:var(--gray)">No archived months yet.</div>`;
    }

    function exportMonth(monthKey) {
        const items = purchases.filter(p=>getMonthKey(p.date)===monthKey);
        const total = items.reduce((s,p)=>s+Number(p.amount),0);
        const inc   = getInc(monthKey);
        const b = new Blob([JSON.stringify({ month:monthKey, income:inc, totalSpent:parseFloat(total.toFixed(2)), totalSaved:parseFloat((inc-total).toFixed(2)), transactions:items.sort((a,b)=>parseLocalDate(b.date)-parseLocalDate(a.date)) }, null, 2)], {type:'application/json'});
        const a = document.createElement('a'); a.href=URL.createObjectURL(b); a.download=`budget_${monthKey.replace(/\s/g,'_')}.json`; a.click();
    }

    // ── Trends ────────────────────────────────────────────────────────────────

    function renderTrends() {
        const currentYear = new Date().getFullYear();
        let sData={}, cData={};
        purchases.forEach(p => {
            const [y,m] = String(p.date).split('T')[0].split('-').map(Number);
            const shortMonth = new Date(y,m-1,1).toLocaleString('default',{month:'short'});
            const k = trendScale==='M' ? `${shortMonth}|${y}` : String(y);
            sData[k] = (sData[k]||0) + Number(p.amount);
            if (y===currentYear) cData[p.category] = (cData[p.category]||0) + Number(p.amount);
        });
        const keys = Object.keys(sData).sort((a,b) => {
            if (trendScale==='M') {
                const [aM,aY]=a.split('|'); const [bM,bY]=b.split('|');
                return aY!==bY ? Number(aY)-Number(bY) : MONTH_ORDER.indexOf(aM)-MONTH_ORDER.indexOf(bM);
            }
            return Number(a)-Number(b);
        });
        const sMax = Math.max(...Object.values(sData),1);
        const makeChart = isSavings => keys.map(k => {
            const spent  = sData[k];
            const imk    = trendScale==='M' ? abbrevMonthToKey(k.split('|')[0], Number(k.split('|')[1])) : getMonthKey(todayStr());
            const income = isSavings ? getInc(imk) : 0;
            const val    = isSavings ? Math.max(0, income-spent) : spent;
            const h      = (val / (isSavings ? (income||5000) : sMax)) * 130;
            const label  = trendScale==='M' ? k.split('|')[0] : k;
            return `<div style="display:flex;flex-direction:column;align-items:center;flex:1">
                <span style="font-size:9px;color:var(--gray);margin-bottom:4px">$${val.toFixed(0)}</span>
                <div style="width:70%;max-width:30px;height:${Math.max(h,4)}px;background:${isSavings?'var(--green)':'var(--blue)'};border-radius:6px 6px 2px 2px"></div>
                <span style="font-size:10px;font-weight:700;margin-top:8px">${label}</span>
            </div>`;
        }).join('');
        document.getElementById('spendingChart').innerHTML = makeChart(false);
        document.getElementById('savingsChart').innerHTML  = makeChart(true);

        const avg3 = computeCategoryThreeMonthAvg();
        const breakdown = Object.entries(cData).sort((a,b)=>b[1]-a[1]);
        document.getElementById('categoryBreakdown').innerHTML = breakdown.map(([n,t]) => {
            const avg     = avg3[n];
            const avgHtml = avg !== undefined
                ? `<span style="color:var(--gray);font-weight:600;text-align:right;padding-right:16px">$${avg.toFixed(2)}</span>`
                : `<span style="color:var(--gray);font-weight:600;text-align:right;padding-right:16px">—</span>`;
            return `<div style="display:grid;grid-template-columns:1fr auto auto;align-items:center;padding:12px 0;border-bottom:0.5px solid #eee">
                <span style="font-weight:600">${n}</span>${avgHtml}
                <span style="color:var(--red);font-weight:700;text-align:right">$${t.toFixed(2)}</span>
            </div>`;
        }).join('') || '<p style="text-align:center;color:var(--gray);padding:16px 0">No category data this year</p>';
    }

    function computeCategoryThreeMonthAvg() {
        const now = new Date(); const totals = {};
        for (let i=1; i<=3; i++) {
            const d  = new Date(now.getFullYear(), now.getMonth()-i, 1);
            const mk = getMonthKey(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`);
            const monthItems = purchases.filter(p=>getMonthKey(p.date)===mk);
            if (!monthItems.length) continue;
            const ct = {};
            monthItems.forEach(p => { ct[p.category]=(ct[p.category]||0)+Number(p.amount); });
            Object.entries(ct).forEach(([cat,amt]) => { if(!totals[cat]) totals[cat]=[]; totals[cat].push(amt); });
        }
        const avg = {};
        Object.entries(totals).forEach(([cat,vals]) => { avg[cat]=vals.reduce((s,v)=>s+v,0)/vals.length; });
        return avg;
    }

    // ── UX helpers ────────────────────────────────────────────────────────────

    function toggleSearch() {
        const sc = document.getElementById('searchContainer');
        sc.classList.toggle('hidden');
        if (!sc.classList.contains('hidden')) document.getElementById('searchInput').focus();
    }
    function handleSearchInput() {
        const val = document.getElementById('searchInput').value;
        document.getElementById('clearSearch').style.display = val ? 'block' : 'none';
        render();
    }
    function clearSearch() { document.getElementById('searchInput').value=''; handleSearchInput(); }

    function toggleAcc(id) {
        const el = document.getElementById(id);
        const isOpen = el.classList.contains('open');
        document.querySelectorAll('.accordion-content').forEach(c=>c.classList.remove('open'));
        if (!isOpen) el.classList.add('open');
    }
    function switchTab(t) {
        document.querySelectorAll('section').forEach(s=>s.classList.add('hidden'));
        document.getElementById(t+'View').classList.remove('hidden');
        document.querySelectorAll('.nav-tab').forEach(n=>n.classList.remove('active'));
        document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).classList.add('active');
        if (t==='archive') renderArchive();
        if (t==='trends')  renderTrends();
    }

    // ── Settings ──────────────────────────────────────────────────────────────

    function openSettings() {
        document.getElementById('payInput').value     = settings.pay;
        document.getElementById('payDateInput').value = settings.payDate;
        document.getElementById('settingsSheet').classList.add('active');
        document.getElementById('overlay').style.display = 'block';
    }
    function saveSettings() {
        settings.pay     = Number(document.getElementById('payInput').value);
        settings.payDate = document.getElementById('payDateInput').value;
        snapshotCurrentPayToHistory();
        localStorage.setItem('bp_settings', JSON.stringify(settings));
        closeAll(); render();
    }
    function closeAll() {
        document.querySelectorAll('.sheet').forEach(s=>s.classList.remove('active'));
        document.getElementById('overlay').style.display='none';
    }
    function setViewMode(m) {
        viewMode = m;
        document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
        document.getElementById('f'+m.charAt(0).toUpperCase()+m.slice(1)).classList.add('active');
        render();
    }
    function setTrendScale(s) {
        trendScale = s;
        document.getElementById('tM').classList.toggle('active', s==='M');
        document.getElementById('tY').classList.toggle('active', s==='Y');
        renderTrends();
    }
    function deleteItem(id) {
        if (!confirm("Delete this transaction?")) return;
        purchases = purchases.filter(p=>p.id!==id);
        localStorage.setItem('bp_purchases', JSON.stringify(purchases));
        if (!document.getElementById('archiveView').classList.contains('hidden')) renderArchive();
        else if (!document.getElementById('trendsView').classList.contains('hidden')) renderTrends();
        else render();
    }

    // ── Add flow ──────────────────────────────────────────────────────────────

    const steps = ["amount","merchant","category","subcategory","date","recurring"];
    let currentStep=0, tempItem={}, recurringSelection=false;

    function openAdd() {
        currentStep=0; tempItem={ date:todayStr() }; recurringSelection=false;
        updateStepUI();
        document.getElementById('addSheet').classList.add('active');
        document.getElementById('overlay').style.display='block';
    }
    function updateStepUI() {
        const container = document.getElementById('stepContainer');
        const step      = steps[currentStep];
        document.getElementById('stepTitle').innerText = step==='recurring' ? 'RECURRING?' : step.toUpperCase();
        document.getElementById('nextBtn').innerText   = currentStep===steps.length-1 ? 'Save' : 'Next';

        if      (step==='amount')      container.innerHTML = `<input type="number" id="stepInput" placeholder="0.00" autofocus inputmode="decimal">`;
        else if (step==='merchant')    container.innerHTML = `<input type="text" id="stepInput" placeholder="Store name">`;
        else if (step==='category')    container.innerHTML = `<select id="stepInput"><option>Food</option><option>Groceries</option><option>Leisure</option><option>Bills</option><option>Travel</option></select>`;
        else if (step==='subcategory') container.innerHTML = `<input type="text" id="stepInput" placeholder="Optional context">`;
        else if (step==='date')        container.innerHTML = `<input type="date" id="stepInput" value="${tempItem.date}">`;
        else if (step==='recurring')   container.innerHTML = `
            <p style="color:var(--gray);font-size:13px;margin:0 0 12px">Does this repeat every month?<br><small>(e.g. rent, subscriptions, gym)</small></p>
            <div class="recur-row">
                <button class="recur-btn ${recurringSelection===true?'selected':''}"  onclick="selectRecurring(true)">🔁 Yes, monthly</button>
                <button class="recur-btn ${recurringSelection===false?'selected':''}" onclick="selectRecurring(false)">✕ No, one-time</button>
            </div>`;
    }
    function selectRecurring(val) { recurringSelection=val; updateStepUI(); }
    function handleNext() {
        const step  = steps[currentStep];
        const input = document.getElementById('stepInput');
        if (step==='recurring') {
            tempItem.recurring = recurringSelection;
            purchases.push({...tempItem, id:Date.now()});
            localStorage.setItem('bp_purchases', JSON.stringify(purchases));
            closeAll(); render(); return;
        }
        if (input) tempItem[step] = input.value;
        currentStep++;
        updateStepUI();
    }

    // ── Week ranges ───────────────────────────────────────────────────────────

    function getWeekRanges(year, month) {
        let r=[], start=new Date(year,month,1); const endMonth=new Date(year,month+1,0);
        while (start<=endMonth) {
            let end=new Date(start); end.setDate(start.getDate()+(6-start.getDay()));
            if (end>endMonth) end=new Date(endMonth);
            const l=`${start.toLocaleString('default',{month:'short'})} ${start.getDate()} – ${end.toLocaleString('default',{month:'short'})} ${end.getDate()}`;
            r.push({ start:new Date(start), end:new Date(end), label:l });
            start=new Date(end); start.setDate(start.getDate()+1);
        }
        return r;
    }

    // ── Import / export ───────────────────────────────────────────────────────

    function exportData() {
        const b=new Blob([JSON.stringify({purchases,settings})],{type:'application/json'});
        const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='budget_pro.json'; a.click();
    }
    function importData(e) {
        const f=e.target.files[0]; if(!f) return;
        const r=new FileReader();
        r.onload=ev=>{
            const d=JSON.parse(ev.target.result);
            purchases=d.purchases; settings=d.settings;
            if(!settings.history) settings.history=[];
            localStorage.setItem('bp_purchases',JSON.stringify(purchases));
            localStorage.setItem('bp_settings',JSON.stringify(settings));
            render(); alert("Data Imported!"); closeAll();
        };
        r.readAsText(f);
    }

    // ── Init ──────────────────────────────────────────────────────────────────

    snapshotCurrentPayToHistory();
    autoPopulateRecurring();
    localStorage.setItem('bp_settings', JSON.stringify(settings));
    render();
</script>
