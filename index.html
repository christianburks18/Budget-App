    /* ══ FIX 1: Hero card contains search + month + settings ══ */

        width: 32px; height: 32px; border-radius: 16px;

<script>
    let purchases = JSON.parse(localStorage.getItem('bp_purchases') || '[]');
    let settings  = JSON.parse(localStorage.getItem('bp_settings')  || '{"pay":2285,"payDate":"","history":[]}');
    let viewMode   = 'all';
    let trendScale = 'M';

    const MONTH_ORDER = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    // ── Date helpers ──────────────────────────────────────────────────────────
    function parseLocalDate(s) {
        const [y,m,d] = String(s).split('T')[0].split('-').map(Number);
        return new Date(y, m-1, d);
    }
    function getMonthKey(s) {
        const d = parseLocalDate(s);
        return d.toLocaleString('default', { month:'long', year:'numeric' });
    }
    function abbrevMonthToKey(abbrev, year) {
        const idx = MONTH_ORDER.indexOf(abbrev);
        return idx === -1 ? '' : new Date(year, idx, 1).toLocaleString('default', { month:'long', year:'numeric' });
    }
    function todayStr() {
        const n = new Date();
        return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
    }

    // ── Income ────────────────────────────────────────────────────────────────
    function getInc(monthKey) {
        if (!settings.history) settings.history = [];
        const h = settings.history.find(r => r.month === monthKey);
        return (h ? h.pay : settings.pay) * 2;
    }
    function snapshotCurrentPayToHistory() {
        if (!settings.history) settings.history = [];
        const key = getMonthKey(todayStr());
        const ex  = settings.history.find(r => r.month === key);
        if (ex) ex.pay = settings.pay;
        else settings.history.push({ month: key, pay: settings.pay });
    }

    // ── Recurring ─────────────────────────────────────────────────────────────
    function autoPopulateRecurring() {
        const curKey = getMonthKey(todayStr());
        const now    = new Date();
        const seen   = new Set(), templates = [];
        purchases.filter(p => p.recurring).slice()
            .sort((a,b) => parseLocalDate(b.date) - parseLocalDate(a.date))
            .forEach(p => {
                const k = `${p.merchant}|${p.category}|${p.amount}`;
                if (!seen.has(k)) { seen.add(k); templates.push(p); }
            });
        let added = false;
        templates.forEach(t => {
            const exists = purchases.some(p =>
                p.recurring && p.merchant === t.merchant &&
                p.category  === t.category && getMonthKey(p.date) === curKey
            );
            if (!exists) {
                const origDay = parseLocalDate(t.date).getDate();
                const maxDay  = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
                const day     = Math.min(origDay, maxDay);
                const ds = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                purchases.push({ id: Date.now()+Math.random(), merchant:t.merchant, category:t.category, subcategory:t.subcategory||'', amount:t.amount, date:ds, recurring:true, autoAdded:true });
                added = true;
            }
        });
        if (added) localStorage.setItem('bp_purchases', JSON.stringify(purchases));
    }

    // ── Hero card ─────────────────────────────────────────────────────────────
    function renderHero(spent, inc) {
        const saved    = inc - spent;
        const pct      = inc > 0 ? Math.min(100, Math.max(0, saved/inc*100)) : 0;
        const spendPct = inc > 0 ? Math.min(100, spent/inc*100) : 0;
        const now      = new Date();

        document.getElementById('headerMonth').textContent    = now.toLocaleString('default', {month:'long'});
        document.getElementById('heroSaved').textContent      = `$${saved.toFixed(2)}`;
        document.getElementById('heroRate').textContent       = `${pct.toFixed(0)}% saved`;
        document.getElementById('heroBar').style.width        = `${spendPct}%`;
        document.getElementById('heroBarLabel').textContent   = `$${spent.toFixed(2)} of $${inc.toLocaleString()} spent`;
        document.getElementById('heroIncome').textContent     = `$${inc.toLocaleString()}`;
        document.getElementById('heroSpent').textContent      = `$${spent.toFixed(2)}`;
        document.getElementById('heroRemaining').textContent  = `$${saved.toFixed(2)}`;

        const fill  = document.getElementById('heroBar');
        const badge = document.getElementById('heroRate');
        if (saved < 0) {
            fill.style.background  = 'linear-gradient(90deg, rgba(255,255,255,0.85), #ff3b30)';
            badge.style.background = 'rgba(255,59,48,0.25)';
        } else {
            fill.style.background  = 'linear-gradient(90deg, rgba(255,255,255,0.85), #30d158)';
            badge.style.background = 'rgba(255,255,255,0.2)';
        }
    }

    // ── Month view ────────────────────────────────────────────────────────────
    function render() {
        const now    = new Date();
        const curKey = getMonthKey(todayStr());
        const inc    = getInc(curKey);
        const query  = document.getElementById('searchInput').value.toLowerCase();

        const cur = purchases.filter(p => getMonthKey(p.date) === curKey);
        const flt = cur.filter(p =>
            p.merchant.toLowerCase().includes(query) ||
            p.category.toLowerCase().includes(query) ||
            (p.subcategory||'').toLowerCase().includes(query)
        );
        const spent = flt.reduce((s,p) => s+Number(p.amount), 0);
        renderHero(spent, inc);

        const sorted = flt.slice().sort((a,b) => parseLocalDate(b.date)-parseLocalDate(a.date));
        const list   = document.getElementById('purchaseList');

        if (viewMode === 'all') {
            list.innerHTML = sorted.map(itemHtml).join('');

        } else if (viewMode === 'category') {
            const lastDate   = new Date(now.getFullYear(), now.getMonth()-1, 1);
            const lastKey    = getMonthKey(`${lastDate.getFullYear()}-${String(lastDate.getMonth()+1).padStart(2,'0')}-01`);
            const lastCats   = purchases.filter(p => getMonthKey(p.date)===lastKey)
                .reduce((a,p) => { a[p.category]=(a[p.category]||0)+Number(p.amount); return a; }, {});
            const cats = sorted.reduce((a,p) => { a[p.category]=(a[p.category]||0)+Number(p.amount); return a; }, {});

            list.innerHTML = Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(([n,amt],i) => {
                const last=lastCats[n]||0, diff=amt-last;
                let mom='';
                if      (!last)            mom=`<span class="mom-badge mom-flat">New</span>`;
                else if (Math.abs(diff)<.01) mom=`<span class="mom-badge mom-flat">= same</span>`;
                else if (diff>0)            mom=`<span class="mom-badge mom-up">↑ $${diff.toFixed(2)}</span>`;
                else                        mom=`<span class="mom-badge mom-down">↓ $${Math.abs(diff).toFixed(2)}</span>`;
                return `
                    <div class="accordion-header" style="margin-bottom:8px" onclick="toggleAcc('cat${i}')">
                        <div class="acc-row">
                            <strong>${n}</strong>
                            <div style="display:flex;align-items:center;gap:8px">${mom}<strong>$${amt.toFixed(2)}</strong></div>
                        </div>
                    </div>
                    <div id="cat${i}" class="accordion-content">${sorted.filter(p=>p.category===n).map(itemHtml).join('')}</div>`;
            }).join('');

        } else {
            const ranges = getWeekRanges(now.getFullYear(), now.getMonth());
            list.innerHTML = ranges.map((r,i) => {
                const items = sorted.filter(p => { const d=parseLocalDate(p.date); return d>=r.start&&d<=r.end; });
                const tot   = items.reduce((s,x)=>s+Number(x.amount),0);
                return `
                    <div class="accordion-header" style="margin-bottom:8px" onclick="toggleAcc('wk${i}')">
                        <div class="acc-meta">${r.label}</div>
                        <div class="acc-row"><strong>Week ${i+1}</strong><strong>$${tot.toFixed(2)}</strong></div>
                    </div>
                    <div id="wk${i}" class="accordion-content">${items.map(itemHtml).join('')}</div>`;
            }).join('');
        }
    }

    function itemHtml(p) {
        const ds  = parseLocalDate(p.date).toLocaleString('default',{month:'short',day:'numeric'});
        const rec = p.recurring ? `<span class="recurring-badge">🔁 Recurring</span>` : '';
        return `<div class="item-card">
            <div class="item-main">
                <span class="item-date">${ds}</span>
                <strong>${p.merchant}</strong>
                <span class="item-sub">${p.category}${p.subcategory?' • '+p.subcategory:''}</span>
                ${rec}
            </div>
            <div style="display:flex;align-items:center;gap:12px">
                <strong style="font-size:16px">$${Number(p.amount).toFixed(2)}</strong>
                <button style="border:none;background:none;font-size:18px;cursor:pointer" onclick="deleteItem(${p.id})">🗑️</button>
            </div>
        </div>`;
    }

    // ── Archive — FIX 4 ───────────────────────────────────────────────────────
    function renderArchive() {
        const curKey = getMonthKey(todayStr());
        const months = [...new Set(purchases.map(p=>getMonthKey(p.date)))]
            .filter(m=>m!==curKey).sort((a,b)=>new Date(b)-new Date(a));

        document.getElementById('archiveList').innerHTML = months.map((m,idx) => {
            const items = purchases.filter(p=>getMonthKey(p.date)===m)
                .sort((a,b)=>parseLocalDate(b.date)-parseLocalDate(a.date));
            const spent  = items.reduce((s,p)=>s+Number(p.amount),0);
            const inc    = getInc(m);
            const saved  = inc - spent;
            return `<div class="arc-card">
                <div class="arc-card-header" onclick="toggleAcc('arc${idx}')">
                    <div class="arc-top-row">
                        <div class="arc-title-block">
                            <strong>${m}</strong>
                            <small>${items.length} Transactions</small>
                        </div>
                        <span style="font-size:15px;font-weight:800;color:${saved>=0?'var(--green)':'var(--red)'}">$${saved.toFixed(2)} saved</span>
                    </div>
                    <!-- FIX 4: income / spent / saved row -->
                    <div class="arc-stat-row">
                        <div class="arc-stat"><h6>Income</h6><p style="color:var(--blue)">$${inc.toLocaleString()}</p></div>
                        <div class="arc-stat"><h6>Spent</h6><p style="color:var(--red)">$${spent.toFixed(2)}</p></div>
                        <div class="arc-stat"><h6>Saved</h6><p style="color:${saved>=0?'var(--green)':'var(--red)'}">$${saved.toFixed(2)}</p></div>
                    </div>
                </div>
                <button class="arc-export-btn" onclick="exportMonth('${m}')">⬇ Export Month</button>
                <div id="arc${idx}" class="accordion-content arc-items-wrap">${items.map(itemHtml).join('')}</div>
            </div>`;
        }).join('') || `<div style="text-align:center;padding:40px;color:var(--gray)">No archived months yet.</div>`;
    }

    function exportMonth(monthKey) {
        const items = purchases.filter(p=>getMonthKey(p.date)===monthKey);
        const spent = items.reduce((s,p)=>s+Number(p.amount),0);
        const inc   = getInc(monthKey);
        const blob  = new Blob([JSON.stringify({ month:monthKey, income:inc, totalSpent:+spent.toFixed(2), totalSaved:+(inc-spent).toFixed(2), transactions:items }, null, 2)], {type:'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `budget_${monthKey.replace(/\s/g,'_')}.json`;
        a.click();
    }

    // ── Trends — FIX 2 (Apple Health SVG chart) ──────────────────────────────
    function renderTrends() {
        const curYear = new Date().getFullYear();
        let sData = {}, cData = {};

        purchases.forEach(p => {
            const [y,mo] = String(p.date).split('T')[0].split('-').map(Number);
            const abbrev = new Date(y,mo-1,1).toLocaleString('default',{month:'short'});
            const k = trendScale==='M' ? `${abbrev}|${y}` : String(y);
            sData[k] = (sData[k]||0) + Number(p.amount);
            if (y===curYear) cData[p.category]=(cData[p.category]||0)+Number(p.amount);
        });

        const keys = Object.keys(sData).sort((a,b) => {
            if (trendScale==='M') {
                const [aM,aY]=a.split('|'), [bM,bY]=b.split('|');
                return aY!==bY ? Number(aY)-Number(bY) : MONTH_ORDER.indexOf(aM)-MONTH_ORDER.indexOf(bM);
            }
            return Number(a)-Number(b);
        });

        // Subtitle
        const subLabel = keys.length
            ? trendScale==='M'
                ? `${keys[0].split('|')[0]} – ${keys[keys.length-1].split('|')[0]} ${keys[keys.length-1].split('|')[1]}`
                : `${keys[0]} – ${keys[keys.length-1]}`
            : '';
        document.getElementById('spendingSub').textContent = subLabel;
        document.getElementById('savingsSub').textContent  = subLabel;

        // Draw Health-style SVG chart
        // Layout: viewBox 300x180, chart area y:20→155, x:0→255, y-axis labels at x:258
        const CHART_LEFT = 0, CHART_RIGHT = 255, CHART_TOP = 20, CHART_BOTTOM = 155;
        const CHART_H = CHART_BOTTOM - CHART_TOP;
        const CHART_W = CHART_RIGHT - CHART_LEFT;

        function buildSVG(data, color, isSavings) {
            if (!keys.length) return '<text x="140" y="90" text-anchor="middle" font-size="12" fill="#aaa">No data yet</text>';

            const vals = keys.map(k => {
                const spent  = data[k]||0;
                if (!isSavings) return spent;
                const imk = trendScale==='M' ? abbrevMonthToKey(k.split('|')[0], Number(k.split('|')[1])) : getMonthKey(todayStr());
                return Math.max(0, getInc(imk) - spent);
            });

            const maxVal = Math.max(...vals, 1);
            // Nice round y-axis max
            const niceMax = niceNumber(maxVal);
            const mid     = niceMax / 2;

            const barW  = Math.min(36, Math.floor((CHART_W / keys.length) * 0.55));
            const slot  = CHART_W / keys.length;
            const curMo = new Date().toLocaleString('default',{month:'short'});
            const curYr = String(new Date().getFullYear());

            let parts = [];

            // Gridlines + y labels
            [[0, CHART_BOTTOM], [mid, CHART_TOP + CHART_H/2], [niceMax, CHART_TOP]].forEach(([val, y]) => {
                const dash = val===0 ? '' : 'stroke-dasharray="4,4"';
                parts.push(`<line x1="${CHART_LEFT}" y1="${y}" x2="${CHART_RIGHT}" y2="${y}" stroke="#eee" stroke-width="1" ${dash}/>`);
                parts.push(`<text x="258" y="${y+4}" font-size="9" fill="#bbb" font-family="-apple-system,sans-serif">${formatK(val)}</text>`);
            });

            // Bars + x labels
            keys.forEach((k, i) => {
                const val   = vals[i];
                const barH  = Math.max(4, (val/niceMax)*CHART_H);
                const x     = CHART_LEFT + slot*i + (slot-barW)/2;
                const y     = CHART_BOTTOM - barH;
                const label = trendScale==='M' ? k.split('|')[0] : k;
                const isCur = trendScale==='M'
                    ? (k.split('|')[0]===curMo && k.split('|')[1]===curYr)
                    : k===curYr;
                const opacity = isCur ? '1' : '0.55';
                const lblColor = isCur ? color : '#888';
                const lblWeight = isCur ? '700' : '500';

                parts.push(`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW}" height="${barH.toFixed(1)}" rx="5" fill="${color}" opacity="${opacity}"/>`);
                // Value label above bar — only show for current month and tallest bar
                if (isCur || val === maxVal) {
                    parts.push(`<text x="${(x+barW/2).toFixed(1)}" y="${(y-4).toFixed(1)}" font-size="9" fill="${color}" text-anchor="middle" font-family="-apple-system,sans-serif">$${val.toFixed(0)}</text>`);
                }
                parts.push(`<text x="${(x+barW/2).toFixed(1)}" y="175" font-size="10" fill="${lblColor}" text-anchor="middle" font-weight="${lblWeight}" font-family="-apple-system,sans-serif">${label}</text>`);
            });

            return parts.join('\n');
        }

        document.getElementById('spendingChart').innerHTML = buildSVG(sData, '#007aff', false);
        document.getElementById('savingsChart').innerHTML  = buildSVG(sData, '#34c759', true);

        // FIX 3: Category table
        const avg3  = computeCategoryThreeMonthAvg();
        const breakdown = Object.entries(cData).sort((a,b)=>b[1]-a[1]);
        document.getElementById('categoryBreakdown').innerHTML = breakdown.map(([n,total]) => {
            const avg = avg3[n];
            const avgHtml = avg !== undefined
                ? `<span class="cat-avg">$${avg.toFixed(2)}</span>`
                : `<span class="cat-avg">—</span>`;
            // Show red only when yearly total is notably above 3-mo avg
            const cls = (avg !== undefined && total > avg * 1.05) ? 'over' : 'norm';
            return `<div class="cat-data-row">
                <span class="cat-name">${n}</span>
                ${avgHtml}
                <span class="cat-total ${cls}">$${total.toFixed(2)}</span>
            </div>`;
        }).join('') || '<p style="color:var(--gray);padding:16px 0;text-align:center">No data this year</p>';
    }

    function computeCategoryThreeMonthAvg() {
        const now = new Date(); const totals = {};
        for (let i=1; i<=3; i++) {
            const d  = new Date(now.getFullYear(), now.getMonth()-i, 1);
            const mk = getMonthKey(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`);
            const mi = purchases.filter(p=>getMonthKey(p.date)===mk);
            if (!mi.length) continue;
            const ct = {};
            mi.forEach(p => { ct[p.category]=(ct[p.category]||0)+Number(p.amount); });
            Object.entries(ct).forEach(([c,v]) => { if(!totals[c]) totals[c]=[]; totals[c].push(v); });
        }
        const avg = {};
        Object.entries(totals).forEach(([c,vs]) => { avg[c]=vs.reduce((s,v)=>s+v,0)/vs.length; });
        return avg;
    }

    function niceNumber(v) {
        if (v <= 0) return 1000;
        const mag = Math.pow(10, Math.floor(Math.log10(v)));
        const norm = v / mag;
        let nice = norm <= 1 ? 1 : norm <= 2 ? 2 : norm <= 5 ? 5 : 10;
        return nice * mag;
    }
    function formatK(v) {
        if (v === 0) return '$0';
        if (v >= 1000) return `$${(v/1000).toFixed(v%1000===0?0:1)}k`;
        return `$${v}`;
    }

    // ── UX helpers ────────────────────────────────────────────────────────────
    function toggleSearch() {
        const sc = document.getElementById('searchContainer');
        sc.classList.toggle('hidden');
        if (!sc.classList.contains('hidden')) document.getElementById('searchInput').focus();
    }
    function handleSearchInput() {
        const v = document.getElementById('searchInput').value;
        document.getElementById('clearSearch').style.display = v ? 'block' : 'none';
        render();
    }
    function clearSearch() { document.getElementById('searchInput').value=''; handleSearchInput(); }

    function toggleAcc(id) {
        const el=document.getElementById(id), open=el.classList.contains('open');
        document.querySelectorAll('.accordion-content').forEach(c=>c.classList.remove('open'));
        if (!open) el.classList.add('open');
    }
    function switchTab(t) {
        document.querySelectorAll('section').forEach(s=>s.classList.add('hidden'));
        document.getElementById(t+'View').classList.remove('hidden');
        document.querySelectorAll('.nav-tab').forEach(n=>n.classList.remove('active'));
        document.getElementById('tab'+t[0].toUpperCase()+t.slice(1)).classList.add('active');
        if (t==='archive') renderArchive();
        if (t==='trends')  renderTrends();
    }

    function openSettings() {
        document.getElementById('payInput').value     = settings.pay;
        document.getElementById('payDateInput').value = settings.payDate;
        document.getElementById('settingsSheet').classList.add('active');
        document.getElementById('overlay').style.display='block';
    }
    function saveSettings() {
        settings.pay     = Number(document.getElementById('payInput').value);
        settings.payDate = document.getElementById('payDateInput').value;
        snapshotCurrentPayToHistory();
        localStorage.setItem('bp_settings', JSON.stringify(settings));
        closeAll(); render();
    }
    function closeAll() {
        document.querySelectorAll('.sheet').forEach(s=>s.classList.remove('active'));
        document.getElementById('overlay').style.display='none';
    }
    function setViewMode(m) {
        viewMode=m;
        document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
        document.getElementById('f'+m[0].toUpperCase()+m.slice(1)).classList.add('active');
        render();
    }
    function setTrendScale(s) {
        trendScale=s;
        document.getElementById('tM').classList.toggle('active',s==='M');
        document.getElementById('tY').classList.toggle('active',s==='Y');
        renderTrends();
    }
    function deleteItem(id) {
        if (!confirm("Delete this transaction?")) return;
        purchases=purchases.filter(p=>p.id!==id);
        localStorage.setItem('bp_purchases',JSON.stringify(purchases));
        if (!document.getElementById('archiveView').classList.contains('hidden')) renderArchive();
        else if (!document.getElementById('trendsView').classList.contains('hidden')) renderTrends();
        else render();
    }

    // ── Add flow ──────────────────────────────────────────────────────────────
    const STEPS = ["amount","merchant","category","subcategory","date","recurring"];
    let curStep=0, tempItem={}, recurSel=false;

    function openAdd() {
        curStep=0; tempItem={date:todayStr()}; recurSel=false;
        updateStepUI();
        document.getElementById('addSheet').classList.add('active');
        document.getElementById('overlay').style.display='block';
    }
    function updateStepUI() {
        const step=STEPS[curStep];
        document.getElementById('stepTitle').innerText = step==='recurring'?'RECURRING?':step.toUpperCase();
        document.getElementById('nextBtn').innerText   = curStep===STEPS.length-1?'Save':'Next';
        const c=document.getElementById('stepContainer');
        if      (step==='amount')      c.innerHTML=`<input type="number" id="si" placeholder="0.00" autofocus inputmode="decimal">`;
        else if (step==='merchant')    c.innerHTML=`<input type="text" id="si" placeholder="Store name">`;
        else if (step==='category')    c.innerHTML=`<select id="si"><option>Food</option><option>Groceries</option><option>Leisure</option><option>Bills</option><option>Travel</option></select>`;
        else if (step==='subcategory') c.innerHTML=`<input type="text" id="si" placeholder="Optional context">`;
        else if (step==='date')        c.innerHTML=`<input type="date" id="si" value="${tempItem.date}">`;
        else if (step==='recurring')   c.innerHTML=`
            <p style="color:var(--gray);font-size:13px;margin:0 0 12px">Does this repeat every month?<br><small>(e.g. rent, subscriptions, gym)</small></p>
            <div class="recur-row">
                <button class="recur-btn ${recurSel===true?'selected':''}"  onclick="setRecur(true)">🔁 Yes, monthly</button>
                <button class="recur-btn ${recurSel===false?'selected':''}" onclick="setRecur(false)">✕ No, one-time</button>
            </div>`;
    }
    function setRecur(v) { recurSel=v; updateStepUI(); }
    function handleNext() {
        const step=STEPS[curStep], inp=document.getElementById('si');
        if (step==='recurring') {
            purchases.push({...tempItem, recurring:recurSel, id:Date.now()});
            localStorage.setItem('bp_purchases',JSON.stringify(purchases));
            closeAll(); render(); return;
        }
        if (inp) tempItem[step]=inp.value;
        curStep++; updateStepUI();
    }

    // ── Week ranges ───────────────────────────────────────────────────────────
    function getWeekRanges(year, month) {
        let r=[], s=new Date(year,month,1); const end=new Date(year,month+1,0);
        while (s<=end) {
            let e=new Date(s); e.setDate(s.getDate()+(6-s.getDay()));
            if (e>end) e=new Date(end);
            const l=`${s.toLocaleString('default',{month:'short'})} ${s.getDate()} – ${e.toLocaleString('default',{month:'short'})} ${e.getDate()}`;
            r.push({start:new Date(s),end:new Date(e),label:l});
            s=new Date(e); s.setDate(s.getDate()+1);
        }
        return r;
    }

    // ── Import / export ───────────────────────────────────────────────────────
    function exportData() {
        const b=new Blob([JSON.stringify({purchases,settings})],{type:'application/json'});
        const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='budget_pro.json'; a.click();
    }
    function importData(e) {
        const f=e.target.files[0]; if(!f) return;
        const r=new FileReader();
        r.onload=ev=>{
            const d=JSON.parse(ev.target.result);
            purchases=d.purchases; settings=d.settings;
            if(!settings.history) settings.history=[];
            localStorage.setItem('bp_purchases',JSON.stringify(purchases));
            localStorage.setItem('bp_settings',JSON.stringify(settings));
            render(); alert("Imported!"); closeAll();
        };
        r.readAsText(f);
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    snapshotCurrentPayToHistory();
    autoPopulateRecurring();
    localStorage.setItem('bp_settings', JSON.stringify(settings));
    render();
</script>
